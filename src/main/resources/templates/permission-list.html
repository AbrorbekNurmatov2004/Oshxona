<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments :: header_head}"></th:block>
    <title>Huquqlar boshqaruvi — Oshxona</title>
    <style>
        .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; position: relative; z-index: 2; }
        .btn-action { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: var(--accent); color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 14px; border: none; cursor: pointer; transition: transform 0.2s; }
        .btn-action:hover { transform: translateY(-2px); }

        .search-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 20px; position: relative; z-index: 2; display: flex; gap: 12px; align-items: center; }
        .search-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 16px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s; }
        .search-input:focus { border-color: var(--accent); }

        .table-container { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; z-index: 2; }
        .custom-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        .custom-table th { background: rgba(255,255,255,0.02); padding: 16px; color: var(--text3); font-family: 'Syne', sans-serif; font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        .custom-table td { padding: 16px; border-bottom: 1px solid var(--border); color: var(--text2); vertical-align: middle; }
        .custom-table tr:last-child td { border-bottom: none; }
        .custom-table tr:hover td { background: rgba(255,255,255,0.01); color: var(--text); }

        .code-badge { display: inline-block; padding: 4px 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; font-family: monospace; font-size: 13px; color: var(--accent); font-weight: 600; }

        .actions-cell { display: flex; gap: 8px; justify-content: flex-end; }
        .btn-icon { padding: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); display: inline-flex; justify-content: center; align-items: center; transition: all 0.2s; text-decoration: none; }
        .btn-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; }
        .btn-edit:hover { border-color: var(--accent); color: var(--accent); }
        .btn-delete:hover { border-color: var(--red); color: var(--red); }

        .pagination-container { display: flex; justify-content: center; gap: 6px; margin-top: 24px; position: relative; z-index: 2; }
        .page-link { display: inline-flex; align-items: center; justify-content: center; min-width: 36px; height: 36px; padding: 0 8px; border-radius: 6px; background: var(--surface); border: 1px solid var(--border); color: var(--text2); text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        .page-link:hover:not(.disabled) { border-color: var(--accent); color: var(--accent); }
        .page-link.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .page-link.disabled { opacity: 0.4; cursor: not-allowed; }

        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-weight: 500; font-size: 14px; position: relative; z-index: 2; display: flex; align-items: center; gap: 10px; }
        .alert-success { background: rgba(46, 213, 115, 0.1); border: 1px solid #2ed573; color: #2ed573; }
        .alert-danger { background: rgba(255, 74, 90, 0.1); border: 1px solid var(--red, #ff4a5a); color: var(--red, #ff4a5a); }
    </style>
</head>
<body>

<div class="bg-decor"></div>
<div th:replace="~{fragments :: sidebar(activePage='permissions')}"></div>

<main class="main-content">
    <div class="content-header">
        <h1 class="page-title">Tizim Huquqlari (Permissions)</h1>
        <a th:href="@{/permissions/create}" class="btn-action">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            Yangi huquq yaratish
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        <span th:text="${success}">Muvaffaqiyatli bajarildi!</span>
    </div>

    <div th:if="${error}" class="alert alert-danger">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        <span th:text="${error}">Xatolik yuz berdi!</span>
    </div>

    <form th:action="@{/permissions}" method="get" class="search-container">
        <input type="text" name="search" th:value="${search}" class="search-input" placeholder="Huquq nomi bo'yicha qidirish... (Masalan: o'qish)"/>
        <button type="submit" class="btn-action" style="padding: 10px 16px;">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            Izlash
        </button>
        <a th:if="${search != null and !search.isEmpty()}" th:href="@{/permissions}" class="btn-icon btn-delete" style="padding: 10px; height: 38px;" title="Filtrni tozalash">❌</a>
    </form>

    <div class="table-container">
        <table class="custom-table">
            <thead>
            <tr>
                <th>Huquq nomi (Ekran uchun)</th>
                <th>Tizim xavfsizlik kodi (Code)</th>
                <th style="width: 100px; text-align: right;">Amallar</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="permission : ${permissions}">
                <td style="font-weight: 600; color: var(--text);" th:text="${permission.name}">Foydalanuvchilarni o'qish</td>
                <td><span class="code-badge" th:text="${permission.code}">user:read</span></td>
                <td style="text-align: right;">
                    <div class="actions-cell">
                        <a th:href="@{/permissions/update/{id}(id=${permission.id})}" class="btn-icon btn-edit" title="Tahrirlash">
                            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </a>
                        <a th:href="@{/permissions/delete/{id}(id=${permission.id})}" class="btn-icon btn-delete" title="O'chirish"
                           onclick="return confirm('Ushbu huquqni rostdan ham o\'chirmoqchimisiz? (Agar u biror rolda faol bo\'lsa, tizim o\'chirishga yo\'l qo\'ymaydi)')">
                            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                        </a>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(permissions)}">
                <td colspan="3" style="text-align: center; padding: 32px; color: var(--text3);">Hech qanday huquq topilmadi.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${totalPages > 1}" class="pagination-container">

        <a th:href="@{/permissions(page=${currentPage - 1}, search=${search})}"
           class="page-link" th:classappend="${currentPage == 0} ? 'disabled' : ''">«</a>

        <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
           th:href="@{/permissions(page=${i}, search=${search})}"
           th:text="${i + 1}"
           class="page-link"
           th:classappend="${i == currentPage} ? 'active' : ''">1</a>

        <a th:href="@{/permissions(page=${currentPage + 1}, search=${search})}"
           class="page-link" th:classappend="${currentPage == totalPages - 1} ? 'disabled' : ''">»</a>

    </div>
</main>

</body>
</html>

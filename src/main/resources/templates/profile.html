<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments :: header_head}"></th:block>
    <title>Mening Profilim — Oshxona</title>
    <style>
        .main-content { padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .profile-container { width: 100%; max-width: 650px; position: relative; z-index: 2; }
        .profile-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; box-shadow: 0 12px 32px rgba(0,0,0,0.25); display: flex; flex-direction: column; align-items: center; text-align: center; }
        .avatar-wrapper { position: relative; width: 130px; height: 130px; border-radius: 50%; background: var(--surface2); border: 3px solid var(--accent); display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 20px; transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .avatar-wrapper:hover { transform: scale(1.03); box-shadow: 0 0 20px rgba(255, 255, 255, 0.05); }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-placeholder { font-size: 52px; color: var(--text2); font-weight: 700; text-transform: uppercase; }
        .user-name { font-size: 26px; font-weight: 700; color: var(--text); margin: 0 0 6px 0; letter-spacing: -0.5px; }
        .user-role { display: inline-block; padding: 6px 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 20px; font-size: 12px; color: var(--accent); font-weight: 600; text-transform: uppercase; margin-bottom: 32px; letter-spacing: 0.5px; }
        .info-list { width: 100%; border-top: 1px solid var(--border); padding-top: 12px; margin-bottom: 32px; text-align: left; }
        .info-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .info-label-group { display: flex; align-items: center; gap: 12px; color: var(--text3); font-size: 14px; }
        .info-label-group svg { color: var(--accent); opacity: 0.8; }
        .info-value { color: var(--text); font-weight: 600; font-size: 14px; }
        .upload-box { width: 100%; background: var(--surface2); border: 1px dashed var(--border); border-radius: 12px; padding: 24px; box-sizing: border-box; margin-bottom: 24px; transition: border-color 0.2s; }
        .upload-box:hover { border-color: var(--accent); }
        .upload-form { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .upload-title { color: var(--text2); font-size: 14px; font-weight: 500; margin: 0; }
        .file-input { display: none; }
        .file-label { display: inline-flex; align-items: center; gap: 8px; padding: 10px 24px; background: transparent; border: 1px solid var(--border); color: var(--text2); border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
        .file-label:hover { background: var(--surface); color: var(--text); border-color: var(--text3); }
        .profile-actions { display: flex; gap: 12px; width: 100%; }
        .btn-action { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 20px; border-radius: 8px; font-weight: 600; font-size: 14px; text-decoration: none; cursor: pointer; transition: all 0.2s; border: none; }
        .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text2); }
        .btn-secondary:hover { background: var(--surface2); color: var(--text); }
    </style>
</head>
<body>

<div class="bg-decor"></div>
<div th:replace="~{fragments :: sidebar(activePage='profile')}"></div>

<main class="main-content">
    <div class="alert-success" th:if="${param.success}">
        🔒 Parolingiz muvaffaqiyatli o'zgartirildi!
    </div>
    <div style="width: 100%; max-width: 650px;">
        <div th:replace="~{fragments :: alert-error}"></div>
    </div>
    <div class="profile-container">
        <div class="profile-card">

            <div class="avatar-wrapper">
                <img th:if="${user.profileImage != null && !user.profileImage.isEmpty()}"
                     th:src="${user.profileImage}"
                     class="avatar-img"
                     alt="Profil rasmi"/>

                <div th:if="${user.profileImage == null || user.profileImage.isEmpty()}"
                     class="avatar-placeholder"
                     th:text="${user.fullName != null && !user.fullName.isEmpty() ? #strings.substring(user.fullName, 0, 1) : 'U'}">U</div>
            </div>

            <h2 class="user-name" th:text="${user.fullName}">Alisher Navoiy</h2>
            <span class="user-role" th:text="${user.role != null ? (user.role instanceof T(java.lang.String) ? user.role : user.role.name) : 'Xodim'}">ADMIN</span>

            <div class="info-list">
                <div class="info-item">
                    <div class="info-label-group">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.94.725l.548 2.2a1 1 0 01-.321.988l-1.305.98a10.582 10.582 0 004.872 4.872l.98-1.305a1 1 0 01.988-.321l2.2.548a1 1 0 01.725.94V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                        <span>Telefon raqami</span>
                    </div>
                    <span class="info-value" th:text="${user.phone}"></span>
                </div>
            </div>

            <div class="upload-box">
                <form th:action="@{/profile/upload}" method="post" enctype="multipart/form-data" class="upload-form">
                    <p class="upload-title">Profil rasmini yangilash</p>
                    <label for="fileInput" class="file-label">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                        Rasm tanlash
                    </label>
                    <input type="file" id="fileInput" name="file" class="file-input"
                           accept="image/png, image/jpeg, image/jpg" required onchange="this.form.submit()"/>
                </form>
            </div>

            <div class="profile-actions">
                <a th:href="@{/profile/password}" class="btn-action btn-secondary">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                    Parolni o'zgartirish
                </a>
            </div>
        </div>
    </div>
</main>

</body>
</html>

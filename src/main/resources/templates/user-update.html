<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments :: header_head}"></th:block>
    <title>Foydalanuvchini tahrirlash — Oshxona</title>
    <style>
        .main-content {
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content-header {
            width: 100%;
            max-width: 600px;
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            margin: 0;
        }

        .form-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--text3);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text);
            outline: none;
        }

        .error-message {
            color: var(--red, #ff4a5a);
            font-size: 12px;
            margin-top: 6px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
            justify-content: flex-end;
        }

        .btn-submit {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: var(--accent);
            color: #fff;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        .btn-cancel {
            padding: 12px 24px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text2);
            text-decoration: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
<div class="bg-decor"></div>
<div th:replace="~{fragments :: sidebar(activePage='users')}"></div>
<main class="main-content">
    <div class="content-header">
        <h1 class="page-title">Foydalanuvchini tahrirlash</h1>
    </div>
    <div class="form-container">
        <form th:action="@{/users/update/{id}(id=${userId})}" th:object="${dto}" method="post">
            <div th:replace="~{fragments :: alert-error}"></div>
            <div class="form-group">
                <label class="form-label" for="fullName">F.I.SH</label>
                <input type="text" id="fullName" th:field="*{fullName}" class="form-control" required/>
                <div class="error-message" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
            </div>
            <div class="form-group">
                <label class="form-label" for="phone">Telefon raqami</label>
                <input type="text" id="phone" th:field="*{phone}" class="form-control" required/>
                <div class="error-message" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
            </div>
            <select id="roleId" th:field="*{roleId}" class="form-control">
                <option value="">Tanlang</option>
                <option th:each="roleItem : ${roles}"
                        th:value="${roleItem.id}"
                        th:text="${roleItem.name}">
                </option>
            </select>
            <div class="form-actions">
                <button type="submit" class="btn-submit">Yangilash</button>
                <a th:href="@{/users}" class="btn-cancel">Bekor qilish</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>

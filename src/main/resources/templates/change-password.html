<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments :: header_head}"></th:block>
    <title>Parolni o'zgartirish — Oshxona</title>
    <style>
        .main-content { padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .content-header { width: 100%; max-width: 500px; margin-bottom: 24px; text-align: center; }
        .page-title { font-size: 26px; font-weight: 700; color: var(--text); margin: 0; }
        .form-container { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px; width: 100%; max-width: 500px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); box-sizing: border-box; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .form-control { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; box-sizing: border-box; }
        .form-control:focus { border-color: var(--accent); background: rgba(255,255,255,0.02); }
        .error-message { color: var(--red, #ff4a5a); font-size: 12px; margin-top: 6px; font-weight: 500; display: block; }
        .form-actions { display: flex; gap: 12px; margin-top: 32px; border-top: 1px solid var(--border); padding-top: 20px; justify-content: flex-end; }
        .btn-submit { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; background: var(--accent); color: #fff; border-radius: 8px; font-weight: 600; font-size: 14px; border: none; cursor: pointer; transition: transform 0.2s; }
        .btn-submit:hover { transform: translateY(-2px); }
        .btn-cancel { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; background: transparent; border: 1px solid var(--border); color: var(--text2); text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 14px; transition: all 0.2s; }
        .btn-cancel:hover { background: var(--surface2); color: var(--text); }
        .password-hint { font-size: 12px; color: var(--text3); margin-top: 4px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="bg-decor"></div>
<div th:replace="~{fragments :: sidebar(activePage='profile')}"></div>

<main class="main-content">
    <div class="content-header">
        <h1 class="page-title">Xavfsizlik va Parol</h1>
    </div>

    <div class="form-container">
        <form th:action="@{/profile/password}" th:object="${changePasswordDto}" method="post">

            <div class="form-group">
                <label class="form-label" for="oldPassword">Joriy (eski) parol</label>
                <input type="password" id="oldPassword" th:field="*{oldPassword}" class="form-control" required/>
                <div class="error-message" th:if="${#fields.hasErrors('oldPassword')}" th:errors="*{oldPassword}">Xatolik</div>
            </div>

            <div class="form-group">
                <label class="form-label" for="newPassword">Yangi parol</label>
                <input type="password" id="newPassword" th:field="*{newPassword}" class="form-control" required/>
                <div class="error-message" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}">Xatolik</div>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmPassword">Yangi parolni tasdiqlash</label>
                <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control" required/>
                <div class="error-message" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">Xatolik</div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">Saqlash</button>
                <a th:href="@{/profile}" class="btn-cancel">Bekor qilish</a>
            </div>
        </form>
    </div>
</main>


</body>
</html>

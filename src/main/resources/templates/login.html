<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Kirish — Oshxona</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
          rel="stylesheet"/>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #1a1a24;
            --border: #2a2a3a;
            --accent: #ff6b35;
            --accent-glow: rgba(255, 107, 53, 0.15);
            --text: #f0ede8;
            --text2: #9b98a8;
            --text3: #5a5768;
            --red: #f87171;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .bg-decor {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.07) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            pointer-events: none;
        }

        .bg-decor2 {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.04) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            pointer-events: none;
        }

        .login-wrap {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            animation: fadeUp 0.4s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 32px;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .login-tagline {
            color: var(--text3);
            font-size: 14px;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px;
        }

        .login-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 20px;
            margin-bottom: 6px;
        }

        .login-subtitle {
            color: var(--text3);
            font-size: 13px;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-family: 'Syne', sans-serif;
        }

        input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            padding: 13px 16px;
            transition: border-color 0.15s, box-shadow 0.15s;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Syne', sans-serif;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.15s, transform 0.1s;
            letter-spacing: 0.3px;
        }

        .btn-login:hover {
            background: #ff8556;
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-msg {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.2);
            color: var(--red);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
<div class="bg-decor"></div>
<div class="bg-decor2"></div>

<div class="login-wrap">
    <div class="login-header">
        <div class="login-logo">🍽 Oshxona</div>
        <div class="login-tagline">Restoran boshqaruv tizimi</div>
    </div>

    <div class="login-card">
        <div class="login-title">Xush kelibsiz!</div>
        <div class="login-subtitle">Davom etish uchun tizimga kiring</div>

        <div class="error-msg" th:if="${param.error}">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
            Telefon raqam yoki parol noto'g'ri!
        </div>

        <div th:replace="~{fragments :: alert-error}"></div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="phone">Telefon raqam</label>
                <input type="tel" id="phone" name="phone" required autofocus/>
            </div>
            <div class="form-group">
                <label for="password">Parol</label>
                <input type="password" id="password" name="password" required/>
            </div>
            <button type="submit" class="btn-login">Kirish →</button>
        </form>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments :: header_head}"></th:block>
  <title>Yangi Taom Qo'shish — Oshxona</title>
  <style>
    .main-content { padding: 40px; margin-left: 260px; min-height: 100vh; background: #0f111a; color: #f8f9fa; font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; align-items: center; }
    .form-container { background: #151824; border: 1px solid #222638; border-radius: 12px; padding: 32px; width: 100%; max-width: 600px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); box-sizing: border-box; }
    .form-title { margin-top: 0; margin-bottom: 24px; font-size: 22px; font-weight: 700; color: #fff; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: #a0aec0; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-control { width: 100%; background: #1e2235; border: 1px solid #2f3654; border-radius: 8px; padding: 12px 16px; color: #fff; font-size: 14px; outline: none; transition: all 0.2s; box-sizing: border-box; }
    .form-control:focus { border-color: var(--accent, #ff4a5a); background: rgba(255,255,255,0.02); box-shadow: 0 0 0 2px rgba(255, 74, 90, 0.15); }
    select.form-control option { background: #151824; color: #fff; }
    .error-message { color: #ff4a5a; font-size: 12px; margin-top: 6px; display: block; font-weight: 500; }
    .form-actions { display: flex; gap: 12px; margin-top: 32px; border-top: 1px solid #222638; padding-top: 20px; justify-content: flex-end; }
    .btn-submit { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 24px; background: var(--accent, #ff4a5a); color: #fff; border-radius: 8px; font-weight: 600; font-size: 14px; border: none; cursor: pointer; transition: transform 0.2s, background 0.2s; }
    .btn-submit:hover { transform: translateY(-2px); background: #e03e4e; }
    .btn-cancel { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 24px; background: transparent; border: 1px solid #2f3654; color: #a0aec0; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 14px; transition: all 0.2s; box-sizing: border-box; }
    .btn-cancel:hover { background: #2f3654; color: #fff; }
  </style>
</head>
<body>
<div th:replace="~{fragments :: sidebar(activePage='foods')}"></div>

<main class="main-content">
  <div class="form-container">
    <h3 class="form-title">➕ Yangi taom qo'shish</h3>

    <form th:action="@{/foods/create}" th:object="${dto}" method="post" enctype="multipart/form-data">
      <div th:replace="~{fragments :: alert-error}"></div>
      <div class="form-group">
        <label class="form-label" for="name">Taom nomi</label>
        <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="Masalan: Chizburger Max"/>
        <span class="error-message" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="price">Narxi (UZS)</label>
        <input type="number" step="0.01" min="0" id="price" th:field="*{price}" class="form-control" placeholder="0.00"/>
        <span class="error-message" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="image">Rasm yuklash</label>
        <input type="file" id="image" name="image" class="form-control" accept="image/*"/>
      </div>

      <div class="form-group">
        <label class="form-label" for="description">Taom haqida qo'shimcha ma'lumot</label>
        <textarea id="description" th:field="*{description}" class="form-control" rows="4" placeholder="Tarkibi, tayyorlanish vaqti haqida yozing..."></textarea>
      </div>

      <div class="form-actions">
        <a th:href="@{/foods}" class="btn-cancel">Bekor qilish</a>
        <button type="submit" class="btn-submit">Saqlash</button>
      </div>
    </form>
  </div>
</main>
</body>
</html>

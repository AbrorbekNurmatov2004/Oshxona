<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments :: header_head}"></th:block>
    <title>Huquqni tahrirlash — Oshxona</title>
    <style>
        .main-content {
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content-header {
            width: 100%;
            max-width: 600px;
            margin-bottom: 24px;
            position: relative;
            z-index: 2;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            margin: 0;
        }

        .btn-action { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: var(--accent); color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 14px; border: none; cursor: pointer; transition: transform 0.2s; }
        .btn-action:hover { transform: translateY(-2px); }
        .btn-secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); }
        .btn-secondary:hover { border-color: var(--text3); color: var(--text); }
        .form-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            width: 100%;
            max-width: 600px;
            position: relative;
            z-index: 2;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; color: var(--text3); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: var(--text); font-size: 14px; outline: none; transition: all 0.2s; box-sizing: border-box; }
        .form-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.02); }
        .error-feedback { color: var(--red, #ff4a5a); font-size: 13px; margin-top: 6px; display: block; font-weight: 500; }
        .form-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 28px; }
    </style>
</head>
<body>

<div class="bg-decor"></div>
<div th:replace="~{fragments :: sidebar(activePage='permissions')}"></div>

<main class="main-content">
    <div class="content-header">
        <h1 class="page-title">Huquqni tahrirlash</h1>
    </div>

    <div class="form-container">
        <form th:action="@{/permissions/update/{id}(id=${id})}" th:object="${permissionDto}" method="post">
            <div th:replace="~{fragments :: alert-error}"></div>
            <div class="form-group">
                <label for="name" class="form-label">Huquq nomi (Ekran uchun)</label>
                <input type="text" id="name" th:field="*{name}" class="form-input" placeholder="Masalan: User yaratish" required />
                <span class="error-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Nomi noto'g'ri</span>
            </div>

            <div class="form-group">
                <label for="code" class="form-label">Tizim xavfsizlik kodi (Code)</label>
                <input type="text" id="code" th:field="*{code}" class="form-input" placeholder="Masalan: user:create" required />
                <span class="error-feedback" th:if="${#fields.hasErrors('code')}" th:errors="*{code}">Kodi noto'g'ri</span>
            </div>

            <div class="form-actions">
                <a th:href="@{/permissions}" class="btn-action btn-secondary">Bekor qilish</a>
                <button type="submit" class="btn-action">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                    Saqlash
                </button>
            </div>
        </form>
    </div>
</main>

</body>
</html>

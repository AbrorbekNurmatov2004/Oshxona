<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="header_head"> <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #1a1a24;
            --border: #2a2a3a;
            --accent: #ff6b35;
            --accent-glow: rgba(255, 107, 53, 0.15);
            --text: #f0ede8;
            --text2: #9b98a8;
            --text3: #5a5768;
            --red: #f87171;
            --sidebar-width: 260px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
        }

        /* SIDEBAR STYLES */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
        }

        .sidebar-brand {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .brand-logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 24px;
            color: var(--accent);
            text-decoration: none;
            display: inline-block;
        }

        .brand-tagline {
            color: var(--text3);
            font-size: 11px;
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sidebar-menu {
            list-style: none;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .menu-label {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-left: 12px;
            margin-bottom: 4px;
            margin-top: 12px;
        }

        .menu-label:first-child {
            margin-top: 0;
        }

        .menu-item a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text2);
            text-decoration: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .menu-item a svg {
            width: 18px;
            height: 18px;
            stroke: var(--text2);
            transition: stroke 0.2s ease;
        }

        .menu-item a:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .menu-item a:hover svg {
            stroke: var(--text);
        }

        .menu-item.active a {
            background: var(--accent-glow);
            color: var(--accent);
            font-weight: 600;
        }

        .menu-item.active a svg {
            stroke: var(--accent);
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
        }

        .btn-logout {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 12px 16px;
            background: transparent;
            border: none;
            color: var(--text3);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
            text-align: left;
        }

        .btn-logout:hover {
            background: rgba(248, 113, 113, 0.08);
            color: var(--red);
        }

        .btn-logout svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            padding: 40px;
            min-height: 100vh;
            position: relative;
        }

        .bg-decor {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.05) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            pointer-events: none;
            z-index: 1;
        }

        .page-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 28px;
            margin-bottom: 24px;
            position: relative;
            z-index: 2;
        }
    </style>
</head>
<body>

<div class="bg-decor"></div>

<aside class="sidebar" th:fragment="sidebar">
    <div class="sidebar-brand">
        <a th:href="@{/dashboard}" class="brand-logo">🍽 Oshxona</a>
        <div class="brand-tagline">Boshqaruv paneli</div>
    </div>

    <ul class="sidebar-menu">
        <li class="menu-label">Xizmatlar</li>

        <li class="menu-item" th:classappend="${activePage == 'orders'} ? 'active'">
            <a th:href="@{/orders}">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
                </svg>
                Buyurtmalar
            </a>
        </li>

        <li class="menu-item" th:classappend="${activePage == 'foods'} ? 'active'">
            <a th:href="@{/foods}">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                </svg>
                Taomlar
            </a>
        </li>

        <li class="menu-label">Ma'muriyat</li>

        <li class="menu-item" th:classappend="${activePage == 'users'} ? 'active'">
            <a th:href="@{/users}">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                Foydalanuvchilar
            </a>
        </li>

        <li class="menu-item" th:classappend="${activePage == 'roles'} ? 'active'">
            <a th:href="@{/roles}">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                </svg>
                Rollar
            </a>
        </li>

        <li class="menu-item" th:classappend="${activePage == 'permissions'} ? 'active'">
            <a th:href="@{/permissions}">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                </svg>
                Huquqlar
            </a>
        </li>

        <li class="menu-label">Foydalanuvchi</li>

        <li class="menu-item" th:classappend="${activePage == 'profile'} ? 'active'">
            <a th:href="@{/profile}">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                Profil
            </a>
        </li>
    </ul>

    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn-logout">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                </svg>
                Chiqish
            </button>
        </form>
    </div>
</aside>

<div th:fragment="alert-error">
    <div th:if="${globalError}"
         style="background: rgba(248, 113, 113, 0.1);
                    border: 1px solid var(--red);
                    color: var(--red);
                    padding: 16px;
                    border-radius: 8px;
                    margin-bottom: 24px;
                    font-family: 'DM Sans', sans-serif;
                    font-size: 14px;
                    font-weight: 500;
                    display: flex;
                    align-items: center;
                    gap: 10px;">
        <svg style="width: 20px; height: 20px; flex-shrink: 0;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
        <span th:text="${globalError}">Xatolik matni shu yerda chiqadi</span>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments :: header_head}"></th:block>
    <title>Foydalanuvchilar — Oshxona</title>
    <style>
        .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; position: relative; z-index: 2; }
        .btn-action { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: var(--accent); color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 14px; border: none; cursor: pointer; transition: transform 0.2s; }
        .btn-action:hover { transform: translateY(-2px); }

        .search-box { display: flex; gap: 12px; margin-bottom: 24px; position: relative; z-index: 2; }
        .input-field { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; }
        .input-field:focus { border-color: var(--accent); }
        .search-input { width: 300px; }

        .table-container { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; z-index: 2; }
        .custom-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        .custom-table th { background: rgba(255,255,255,0.02); padding: 16px; color: var(--text3); font-family: 'Syne', sans-serif; font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        .custom-table td { padding: 16px; border-bottom: 1px solid var(--border); color: var(--text2); vertical-align: middle; }
        .custom-table tr:last-child td { border-bottom: none; }
        .custom-table tr:hover td { background: rgba(255,255,255,0.01); color: var(--text); }

        .role-badge { display: inline-block; padding: 4px 10px; background: rgba(255,107,53,0.1); color: var(--accent); border-radius: 6px; font-size: 12px; font-weight: 600; }
        .admin-badge { background: rgba(248,113,113,0.1); color: var(--red); }

        .actions-cell { display: flex; gap: 8px; }
        .btn-icon { padding: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); display: inline-flex; justify-content: center; align-items: center; transition: all 0.2s; text-decoration: none; }
        .btn-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; }
        .btn-edit:hover { border-color: var(--accent); color: var(--accent); }
        .btn-delete:hover { border-color: var(--red); color: var(--red); }

        .pagination { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; position: relative; z-index: 2; }
        .page-link { display: inline-flex; align-items: center; justify-content: center; min-width: 36px; height: 36px; padding: 0 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        .page-link:hover:not(.disabled) { border-color: var(--accent); color: var(--accent); }
        .page-link.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); font-weight: 600; }
        .page-link.disabled { color: var(--text3); cursor: not-allowed; pointer-events: none; }
    </style>
</head>
<body>

<div class="bg-decor"></div>
<div th:replace="~{fragments :: sidebar(activePage='users')}"></div>

<main class="main-content">
    <div class="content-header">
        <h1 class="page-title">Foydalanuvchilar</h1>
        <a th:href="@{/users/create}" class="btn-action">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            Yangi foydalanuvchi yaratish
        </a>
    </div>

    <form th:action="@{/users}" method="get" class="search-box">
        <input type="text" name="search" th:value="${search}" class="input-field search-input" placeholder="Ism yoki telefon raqam orqali qidirish..."/>
        <button type="submit" class="btn-action" style="background: var(--surface2); border: 1px solid var(--border); color: var(--text);">🔍 Izlash</button>
    </form>

    <div class="table-container">
        <table class="custom-table">
            <thead>
            <tr>
                <th>Foydalanuvchi</th>
                <th>Telefon raqami</th>
                <th>Roli</th>
                <th style="width: 100px; text-align: right;">Amallar</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td style="font-weight: 500; color: var(--text);" th:text="${user.fullName}"></td>
                <td th:text="${user.phone}"></td>
                <td>
                    <span th:if="${user.superAdmin}" class="role-badge admin-badge">SUPER ADMIN</span>
                    <span th:unless="${user.superAdmin}" class="role-badge" th:text="${user.role != null ? user.role.name : 'Rolsiz'}"></span>
                </td>
                <td style="text-align: right;">
                    <div class="actions-cell" style="justify-content: flex-end;">
                        <a th:href="@{/users/update/{id}(id=${user.id})}" class="btn-icon btn-edit" title="Tahrirlash">
                            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </a>
                        <a th:href="@{/users/delete/{id}(id=${user.id})}" class="btn-icon btn-delete" title="O'chirish"
                           onclick="return confirm('Haqiqatdan ham ushbu foydalanuvchini o\'chirmoqchimisiz?')">
                            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                        </a>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(users)}">
                <td colspan="4" style="text-align: center; padding: 32px; color: var(--text3);">Foydalanuvchilar topilmadi</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="pagination" th:if="${totalPages > 1}">
        <a th:href="@{/users(page=${currentPage - 1}, search=${search})}"
           class="page-link"
           th:classappend="${currentPage == 0} ? 'disabled'">&laquo;</a>

        <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a th:href="@{/users(page=${i}, search=${search})}"
               class="page-link"
               th:classappend="${currentPage == i} ? 'active'"
               th:text="${i + 1}">1</a>
        </th:block>

        <a th:href="@{/users(page=${currentPage + 1}, search=${search})}"
           class="page-link"
           th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">&raquo;</a>
    </div>
</main>

</body>
</html>
